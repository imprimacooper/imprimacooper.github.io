
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imprima Cooper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-color: #1f1f1f;
  }

  .splash-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    width: 100%;
    max-width: 700px;
  }

  .logo {
    width: 100%;
    max-width: 700px;
    height: auto;
    display: block;
  }

  .visit-button {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    color: #ffffff;
    background-color: rgb(0, 100, 147);
    padding: 16px 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0, 100, 147, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    white-space: nowrap;
  }

  .visit-button:hover {
    background-color: rgb(0, 118, 173);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 100, 147, 0.45);
  }

  .visit-button:active {
    transform: translateY(0px) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 100, 147, 0.4);
    background-color: rgb(0, 84, 124);
  }
</style>
</head>
<body>

  <div class="splash-container">
    <img src="logo.svg" alt="Imprima Cooper" class="logo">
    <a href="https://imprimacooper.com.br/" target="_blank" rel="noopener noreferrer" class="visit-button">
      Visitar Site
    </a>
  </div>

</body>
</html>
