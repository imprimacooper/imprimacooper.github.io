
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imprima Cooper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-color: #000000;
    position: relative;
    overflow: hidden;
  }

  .bg-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(
        circle at var(--mx, 50%) var(--my, 50%),
        #1f1f1f 0%,
        #101010 35%,
        #010101 65%,
        #000000 100%
      );
    transition: background-position 0.3s ease-out;
    animation: pulse 10s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      filter: brightness(1);
    }
    50% {
      filter: brightness(1.15);
    }
  }

  .splash-container {
    position: relative;
    z-index: 1;
  }

  .splash-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    width: 100%;
    max-width: 700px;
  }

  .logo {
    width: 100%;
    max-width: 700px;
    height: auto;
    display: block;
  }

  .visit-button {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    color: #ffffff;
    background-color: rgb(0, 100, 147);
    padding: 16px 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0, 100, 147, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    white-space: nowrap;
  }

  .visit-button:hover {
    background-color: rgb(0, 118, 173);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 100, 147, 0.45);
  }

  .visit-button:active {
    transform: translateY(0px) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 100, 147, 0.4);
    background-color: rgb(0, 84, 124);
  }
</style>
</head>

@keyframes draw {
  to { stroke-dashoffset: 0; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes reveal {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Contorno + Imprima simultâneos */
#Contorno {
  stroke-dasharray: 30000;
  stroke-dashoffset: 30000;
  opacity: 0;
  animation: draw 5s linear forwards, fadeIn 5s ease forwards;
  animation-delay: 0s, 0s;
}
#Imprima {
  opacity: 0;
  animation: reveal 0.23s ease forwards;
  animation-delay: 0s;
}

/* sequência */
#C { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 0.23s; }
#O1 { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 0.46s; }
#O2 { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 0.69s; }
#P  { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 0.92s; }

#Ciano   { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 1.15s; }
#Magenta { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 1.38s; }
#Amarelo { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 1.61s; }

/* R_ elementos */
#R_Costas { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 1.84s; }
#R_Frente { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 2.07s; }
#R_Tri    { opacity: 0; animation: reveal 0.23s ease forwards; animation-delay: 2.30s; }

/* R_Fundo cobre de R_Costas até R_Tri (~0.7s) */
#R_Fundo {
  opacity: 0;
  animation: reveal 0.69s ease forwards;
  animation-delay: 1.84s;
}

/* Terceirização */
#Terceirização {
  opacity: 0;
  animation: reveal 0.23s ease forwards;
  animation-delay: 2.53s;
}

  <script>
    const bgLayer = document.getElementById('bgLayer');

    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      bgLayer.style.setProperty('--mx', x + '%');
      bgLayer.style.setProperty('--my', y + '%');
    });

    // Suporte a toque em dispositivos móveis
    window.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      if (touch) {
        const x = (touch.clientX / window.innerWidth) * 100;
        const y = (touch.clientY / window.innerHeight) * 100;
        bgLayer.style.setProperty('--mx', x + '%');
        bgLayer.style.setProperty('--my', y + '%');
      }
    });
  </script>
