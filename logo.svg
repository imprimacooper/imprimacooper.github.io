<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 6770.95 2286.81">
  <style>
    /* Elementos coloridos entram primeiro */
    .color-elements {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.5s;
    }

    /* Elementos brancos entram depois */
    .white-elements {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>

  <!-- Exemplo de elemento colorido -->
  <path class="color-elements" d="M4309.48 898.83l0 163.04 848.59 -0.03c0,-90.01 -72.98,-162.98 -163,-162.99l-685.6 -0.02z" fill="url(#id0)" />

  <!-- Exemplo de elemento branco -->
  <path class="white-elements" d="M1669.96 1426.22l-0.07 -364.45 442.15 1.64c22.47,22.03 9.36,360.08 4.8,364.39 -13.37,12.67 -194.77,6.13 -228.45,6.13z" fill="white"/>
</svg>
