  <style>
    /* Entrance animation: color elements first, whites after */
    .enter {
      opacity: 0;
      transform: translateY(24px);
      transform-origin: center;
      animation-fill-mode: forwards;
      animation-timing-function: cubic-bezier(.2,.9,.2,1);
    }

    /* Color group: slightly earlier and a touch faster */
    .color-enter {
      animation-name: enterUp;
      animation-duration: 700ms;
      animation-delay: 180ms;
    }

    /* White / neutral group: later */
    .white-enter {
      animation-name: enterUp;
      animation-duration: 800ms;
      animation-delay: 620ms;
    }

    /* Stroke/outline group (thin white stroke) — animate with white group */
    .stroke-enter {
      animation-name: enterStroke;
      animation-duration: 700ms;
      animation-delay: 620ms;
      stroke-dasharray: 4000;
      stroke-dashoffset: 4000;
    }

    @keyframes enterUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes enterStroke {
      to {
        opacity: 1;
        stroke-dashoffset: 0;
      }
    }

    /* Small stagger helper for many repeated elements (optional) */
    .stagger-1 { animation-delay: 0.68s; }
    .stagger-2 { animation-delay: 0.74s; }
    .stagger-3 { animation-delay: 0.80s; }
    .stagger-4 { animation-delay: 0.86s; }
  </style>

